<!--
  ============================================================================
  Allenberry digital pass - DAY PASS (t-cream), STANDALONE EDIT TARGET
  ----------------------------------------------------------------------------
  Plain top-level copy of the deployed /p/[token] pass for ONE tier (Day Pass),
  decoupled from the worker. This is the file to edit directly - e.g. to add a
  benefits block BELOW THE QR (inside main.pass, immediately after .qrwrap). The
  four-tier mobile reference lives next to it: pass-template-standalone.html.

  Mobile-first: the pass targets phone width (.pass max-width:480px; the CSS has
  an @media (max-width:560px) block). Preview at a phone viewport to judge it.

  Source of truth: fling-day-pass/src/worker/index.ts
    PASS_CSS (the style block below), passHead() (head + Google Fonts),
    TIERS.day_pass, renderPassPage(). Day Pass uses body class "t-cream".

  Faithful changes only vs. the live page: asset paths absolutized; the server
  add-to-homescreen / service-worker script and the per-token manifest link
  removed; dynamic fields set to sample values (below). The QR is kept as the
  live inline SVG so its placement/size reads true. Nothing visual changed, and
  nothing was added below the QR - that area is left exactly as deployed.

  DYNAMIC ON-CARD FIELDS (Day Pass) - what to re-thread later, and the source:
    .name (two lines) ... people.name, split first/remainder by formatName()
                          (falls back to "Member").  SAMPLE: "Eleanor Hayes".
    .tier eyebrow ...... STATIC: "Day Pass"  (TIERS.day_pass.eyebrow).
    .placeline ......... STATIC: "One day on the Yellow Breeches."
    .validity .vtext ... "Valid {start_date}", date formatted "Month D, YYYY"
                          in America/New_York.  SAMPLE: "July 18, 2026".
    .qr (inline SVG) ... generated by qrcode-generator from the pass URL
                          https://allenberry-passes.flingit.run/p/{pass_token};
                          fill = --tick (#1F3A4D for Day). The embedded SVG is a
                          SAMPLE QR at the live 114px tile size.
    .passid ............ derived: ALB-DAY-{5 digits} (FNV hash of pass_token).
    brand mark image ... STATIC: /pass/mark-navy.png at 54px.
  The pass token/URL is never printed as text - only encoded in the QR and
  hashed into the passid.

  Other tiers (for reference; switch body class + branching in the worker):
    summer_pass=t-copper, porches_resident=t-navy, ccc_reciprocal=t-club.
  ============================================================================
-->

<html lang="en">
<head>

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'DM Sans',system-ui,sans-serif; -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility; min-height:100dvh; background:var(--field); color:var(--type);
}
.t-navy{ --field:#1A2530; --type:#F2ECDF; --type-mute:#93a0a9; --accent:#F2ECDF; --keyline:#F2ECDF; --mat:#EFE8DA; --tile:#F4EEE1; --tile-edge:#cabfa9; --tick:#1A2530; }
.t-copper{ --field:#FED27C; --type:#1A2530; --type-mute:#5b6470; --accent:#365D78; --keyline:#365D78; --mat:#FFFDF6; --tile:#FFFDF7; --tile-edge:#e3cb94; --tick:#365D78; }
.t-cream{ --field:#EFE7D6; --type:#1F3A4D; --type-mute:#73818b; --accent:#B5704A; --keyline:#D4C4AC; --mat:#F4EEE1; --tile:#FFFDF8; --tile-edge:#dcd2c0; --tick:#B5704A; }
.t-club{ --field:#CBBDB6; --type:#33231F; --type-mute:#7B6A62; --accent:#5E2C2C; --keyline:#5E2C2C; --mat:#E1D7D0; --tile:#EFE8E2; --tile-edge:#B1A099; --tick:#5E2C2C; }
/* Content padding is derived from the keyline position so the mark/passid
   always sit inside the frame with explicit breathing room.
   Formula: "keyline edge + N px clearance"
     top:    keyline = max(18px, safe-area-top)   + 32px breathing
     bottom: keyline = max(18px, safe-area-bottom) + 52px breathing (deeper — QR is larger) */
.pass{
  position:relative; min-height:100dvh; max-width:480px; margin:0 auto; display:flex; flex-direction:column;
  padding:calc(max(18px, env(safe-area-inset-top, 0px)) + 32px) 38px calc(max(18px, env(safe-area-inset-bottom, 0px)) + 52px);
  background:var(--field); isolation:isolate;
}
.pass .grain{ position:absolute; inset:0; z-index:0; pointer-events:none; opacity:.06; mix-blend-mode:overlay; }
/* Keyline: inset from each edge, respecting iOS safe-area-inset-* so the
   border never renders behind the Dynamic Island, notch, or home indicator.
   max() takes whichever is larger: the fixed breathing-room inset (18px) or
   the safe-area value (e.g. ~59px on Dynamic Island iPhones in PWA mode).
   border-radius matches the device's rounded corner feel. */
.pass .keyline{
  position:absolute;
  top:max(18px, env(safe-area-inset-top, 0px));
  right:max(18px, env(safe-area-inset-right, 0px));
  bottom:max(18px, env(safe-area-inset-bottom, 0px));
  left:max(18px, env(safe-area-inset-left, 0px));
  border:1px solid var(--keyline);
  border-radius:6px;
  pointer-events:none; z-index:1; opacity:.7;
}
.pass > .layer{ position:relative; z-index:2; }
.brandhead{ display:flex; justify-content:center; padding-top:4px; }
.brandhead img{ width:auto; }
.tier{ text-align:center; font-size:11px; font-weight:500; letter-spacing:.30em; text-transform:uppercase; color:var(--type); margin:14px 0 0; }
.tier .sep{ opacity:.4; margin:0 .5em; font-weight:400; }
.tier .accent{ color:var(--accent); }
/* Zone gaps: top (between brand/eyebrow → name) is generous; bottom
   (between validity → QR) is tighter. This creates the three-chapter feel. */
.spacer-top{ flex:1 1 0; min-height:36px; max-height:88px; }
.spacer-bot{ flex:1 1 0; min-height:20px; max-height:44px; }
.identity{ text-align:center; }
.name{ font-family:'Fraunces',Georgia,serif; font-weight:400; font-variation-settings:"opsz" 144,"SOFT" 0,"WONK" 0; font-size:47px; line-height:1.02; letter-spacing:-0.025em; color:var(--type); margin:0; }
.placeline{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:21px; color:var(--accent); margin:16px 0 0; letter-spacing:.01em; }
.clubseal{ margin-top:20px; display:flex; flex-direction:column; align-items:center; gap:10px; }
.clubseal .medallion{ width:66px; height:66px; border-radius:50%; overflow:hidden; background:#fff; border:1px solid var(--accent); display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.22); }
.clubseal .medallion img{ width:84%; height:84%; object-fit:contain; display:block; }
.clubseal .cname{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:21px; color:var(--accent); letter-spacing:.01em; line-height:1; }
.validity{ margin-top:22px; }
.validity .vrule{ width:34px; height:1px; background:var(--accent); margin:0 auto 13px; }
.validity .vtext{ font-size:11px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; color:var(--type-mute); }
.validity .vtext strong{ color:var(--type); font-weight:600; }
.qrwrap{ display:flex; flex-direction:column; align-items:center; }
.qrtile{ position:relative; padding:13px; background:var(--tile); border:1px solid var(--tile-edge); box-shadow:0 1px 3px rgba(0,0,0,.10); }
.qrtile .qr{ width:114px; height:114px; display:block; }
.qrtile .tick{ position:absolute; width:11px; height:11px; }
.qrtile .tick::before,.qrtile .tick::after{ content:""; position:absolute; background:var(--tick); }
.qrtile .tick::before{ width:11px; height:1px; }
.qrtile .tick::after{ width:1px; height:11px; }
.qrtile .tick.tl{ top:4px; left:4px; }
.qrtile .tick.tr{ top:4px; right:4px; } .qrtile .tick.tr::after{ right:0; } .qrtile .tick.tr::before{ right:0; }
.qrtile .tick.bl{ bottom:4px; left:4px; } .qrtile .tick.bl::before{ bottom:0; } .qrtile .tick.bl::after{ bottom:0; }
.qrtile .tick.br{ bottom:4px; right:4px; } .qrtile .tick.br::before{ bottom:0; right:0; } .qrtile .tick.br::after{ bottom:0; right:0; }
.passid{ margin-top:15px; font-size:11px; font-weight:500; letter-spacing:.22em; color:var(--type-mute); text-transform:uppercase; white-space:nowrap; }
/* Banner uses fixed colors so it's legible on every tier, including t-navy
   where --mat and --type are both near-cream and text would vanish. */
.a2hs{ position:fixed; left:12px; right:12px; bottom:12px; z-index:50; max-width:456px; margin:0 auto;
  background:#F5EFE4; color:#1F3A4D; border:1px solid #d4cdbf; border-radius:10px;
  padding:13px 14px; box-shadow:0 6px 24px rgba(0,0,0,.28); font-size:13px; line-height:1.5;
  display:flex; gap:10px; align-items:flex-start; }
.a2hs.hidden{ display:none; }
.a2hs .txt strong{ font-weight:600; }
.a2hs .x{ margin-left:auto; flex:0 0 auto; background:none; border:0; font-size:18px; line-height:1; color:#73818b; cursor:pointer; padding:0 2px; }
.notfound{ min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; background:#EFE7D6; color:#1F3A4D; }
.notfound h1{ font-family:'Fraunces',Georgia,serif; font-weight:400; font-size:34px; letter-spacing:-0.02em; margin:0 0 12px; }
.notfound p{ font-size:15px; line-height:1.6; color:#73818b; max-width:42ch; margin:0; }
@media (max-width:560px){ .pass{ padding:calc(max(18px, env(safe-area-inset-top, 0px)) + 28px) 26px calc(max(18px, env(safe-area-inset-bottom, 0px)) + 48px); } .name{ font-size:42px; } .spacer-top{ max-height:64px; } .spacer-bot{ max-height:36px; } }
</style>
